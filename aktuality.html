---
layout: default
title: Aktuality
---

<div class="container">
    <h2>Dění v naší chovné stanici</h2>

    <!-- TOTO JE MAGICKÁ SMYČKA: Vypíše automaticky vše ze složky _posts -->
    {% for post in site.posts %}
    <article class="post">
        <!-- Vypíše datum ve formátu Den. Měsíc. Rok -->
        <span class="post-date">{{ post.date | date: "%d. %m. %Y" }}</span>
        
        <h3>{{ post.title }}</h3>
        
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}">
        {% endif %}
        
        <!-- Vypíše samotný text -->
        {{ post.content }}
    </article>
    {% endfor %}

</div>
