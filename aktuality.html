---
layout: default
title: Aktuality
---

<div class="container">
    <h2>Dění v naší chovné stanici</h2>

    {% for post in site.posts %}
    <article class="post">
        <span class="post-date">{{ post.date | date: "%d. %m. %Y" }}</span>
        
        <h3>{{ post.title }}</h3>
        
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}">
        {% endif %}
        
        <!-- Vypíše samotný text -->
        {{ post.content }}

        <!-- Pokud jsi v administraci přidal fotky do galerie, vypíše je to do mřížky -->
        {% if post.gallery %}
        <div class="post-gallery" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
            {% for photo in post.gallery %}
            <a href="{{ photo }}" data-lightbox="galerie-{{ post.slug }}">
                <img src="{{ photo }}" alt="Fotografie v galerii" style="height: 120px; width: auto; object-fit: cover; border-radius: 4px; border: 1px solid #eee;">
            </a>
            {% endfor %}
        </div>
        {% endif %}

    </article>
    {% endfor %}

</div>
