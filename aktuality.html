---
layout: default
title: Aktuality
---

<div class="container">
    <h2>Dění v naší chovné stanici</h2>

    {% for post in site.posts %}
    <article class="post">
        <span class="post-date">{{ post.date | date: "%d. %m. %Y" }}</span>
        
        <h3>{{ post.title }}</h3>
        
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}">
        {% endif %}
        
        <!-- Vypíše samotný text -->
        {{ post.content }}

        <!-- Pokud jsi v administraci přidal fotky do galerie, vypíše je to do mřížky -->
        {% if post.gallery %}
        <div class="post-gallery">
            {% for photo in post.gallery %}
            <!-- data-lightbox="galerie-{{ post.slug }}" zaručí, že se fotky dají proklikat šipkami -->
            <a href="{{ photo.image }}" data-lightbox="galerie-{{ post.slug }}">
                <img src="{{ photo.image }}" alt="Fotografie v galerii">
            </a>
            {% endfor %}
        </div>
        {% endif %}

    </article>
    {% endfor %}

</div>
