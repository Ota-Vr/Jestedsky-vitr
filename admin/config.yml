# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Ota-Vr/Jestedsky-vitr
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/223237ee-07c1-4819-9353-538d405c8ca5/pkce
  auth_token_endpoint: /sites/223237ee-07c1-4819-9353-538d405c8ca5/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://jestedskyvitr.cz

media_folder: "images/web"
public_folder: "images/web"

collections:
  - name: "aktuality"
    label: "Aktuality (Deníček)"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout (Neměnit)", name: "layout", widget: "hidden", default: "default"}
      - {label: "Nadpis aktuality", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Hlavní fotka", name: "image", widget: "image", required: false}
      - {label: "Text", name: "body", widget: "markdown"}
      - label: "Fotogalerie (další fotky dole)"
        name: "gallery"
        widget: "list"
        required: false
        field: {label: "Fotka", name: "image", widget: "image"}